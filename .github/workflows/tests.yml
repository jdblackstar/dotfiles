name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh (required by zshrc.bats)
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Run BATS suite
        run: bash tests/run.sh
